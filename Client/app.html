<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Smart House Price Prediction</title>

    <link rel="stylesheet" href="app.css">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

    <script src="app.js"></script>

</head>

<body>

<div class="overlay"></div>

<div class="container">

    <div class="card">

        <h1>🏠 Smart House Price Prediction</h1>

        <p class="subtitle">
            AI Powered Real Estate Platform
        </p>

        <div class="input-box">

            <label>Area (Square Feet)</label>

            <input type="number"
            id="uiSqft"
            placeholder="Enter Area">

        </div>

        <div class="input-box">

            <label>BHK</label>

            <div class="option-grid">

                <input type="radio"
                id="bhk1"
                name="uiBHK"
                value="1">

                <label for="bhk1">1</label>

                <input type="radio"
                id="bhk2"
                name="uiBHK"
                value="2"
                checked>

                <label for="bhk2">2</label>

                <input type="radio"
                id="bhk3"
                name="uiBHK"
                value="3">

                <label for="bhk3">3</label>

                <input type="radio"
                id="bhk4"
                name="uiBHK"
                value="4">

                <label for="bhk4">4</label>

            </div>

        </div>

        <div class="input-box">

            <label>Bathrooms</label>

            <div class="option-grid">

                <input type="radio"
                id="bath1"
                name="uiBathrooms"
                value="1">

                <label for="bath1">1</label>

                <input type="radio"
                id="bath2"
                name="uiBathrooms"
                value="2"
                checked>

                <label for="bath2">2</label>

                <input type="radio"
                id="bath3"
                name="uiBathrooms"
                value="3">

                <label for="bath3">3</label>

            </div>

        </div>

        <div class="input-box">

            <label>Location</label>

            <select id="uiLocations">

                <option disabled selected>
                    Select Location
                </option>

            </select>

        </div>

        <button class="predict-btn"
        onclick="onClickedEstimatePrice()">

            Predict Price

        </button>

        <div id="uiEstimatedPrice"
        class="result-box">

            <h2>Estimated Price</h2>

        </div>

    </div>

</div>


<!-- BOT ICON -->

<div class="bot-icon"
onclick="toggleChat()">

    <img src="images/chat-bot.webp">

</div>


<!-- CHATBOT -->

<div class="chatbot"
id="chatbot">

    <div class="chat-header">

        🤖 AI Assistant

        <span onclick="toggleChat()">

            ✖

        </span>

    </div>

    <div class="chat-body"
    id="chatBody">

        <div class="bot-message">

            Hello 👋 <br>
            Ask me about Bangalore properties.

        </div>

    </div>

    <div class="chat-input">

        <input type="text"
        id="userMessage"
        placeholder="Ask something...">

        <button onclick="sendMessage()">

            Send

        </button>

    </div>

</div>

</body>
</html>
