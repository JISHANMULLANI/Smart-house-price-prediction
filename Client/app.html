<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bangalore Home Price Prediction</title>

    <link rel="stylesheet" href="app.css">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

    <script src="app.js"></script>

</head>

<body>

    <div class="overlay"></div>

    <div class="container">

        <div class="card">

            <div class="top-section">

                <h1>🏠 Bangalore House Price Prediction</h1>

                <p>
                    AI Powered Real Estate Price Prediction System
                </p>

            </div>

            <div class="input-box">

                <label>Area (Square Feet)</label>

                <input type="number" id="uiSqft" placeholder="Enter Area in Sqft">

            </div>

            <div class="input-box">

                <label>BHK</label>

                <div class="option-grid">

                    <input type="radio" id="bhk1" name="uiBHK" value="1">
                    <label for="bhk1">1</label>

                    <input type="radio" id="bhk2" name="uiBHK" value="2" checked>
                    <label for="bhk2">2</label>

                    <input type="radio" id="bhk3" name="uiBHK" value="3">
                    <label for="bhk3">3</label>

                    <input type="radio" id="bhk4" name="uiBHK" value="4">
                    <label for="bhk4">4</label>

                    <input type="radio" id="bhk5" name="uiBHK" value="5">
                    <label for="bhk5">5</label>

                </div>

            </div>

            <div class="input-box">

                <label>Bathrooms</label>

                <div class="option-grid">

                    <input type="radio" id="bath1" name="uiBathrooms" value="1">
                    <label for="bath1">1</label>

                    <input type="radio" id="bath2" name="uiBathrooms" value="2" checked>
                    <label for="bath2">2</label>

                    <input type="radio" id="bath3" name="uiBathrooms" value="3">
                    <label for="bath3">3</label>

                    <input type="radio" id="bath4" name="uiBathrooms" value="4">
                    <label for="bath4">4</label>

                    <input type="radio" id="bath5" name="uiBathrooms" value="5">
                    <label for="bath5">5</label>

                </div>

            </div>

            <div class="input-box">

                <label>Location</label>

                <select id="uiLocations">

                    <option value="" disabled selected>
                        Select Location
                    </option>

                </select>

            </div>

            <button class="predict-btn" onclick="onClickedEstimatePrice()">

                Predict Price

            </button>

            <div class="result-box" id="uiEstimatedPrice">

                <h2>Estimated Price Will Appear Here</h2>

            </div>

        </div>

    </div>

</body>

</html>
